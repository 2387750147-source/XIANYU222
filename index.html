<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园二手 · 闲置交易平台</title>
    <link rel="stylesheet" href="../../public/style.css">
</head>
<body>
    <!-- 头部 -->
    <header class="header-wrapper">
        <a href="./index.html" class="logo">🏫 校园二手</a>
        <div class="right-panel">
            <a href="../publish/publish.html" class="nav-link publish-btn">📤 发布闲置</a>
            <a href="../favorites/favorites.html" class="nav-link">❤️ 收藏</a>
            <a href="../profile/profile.html" class="nav-link">👤 我的</a>
            <div class="auth-buttons" id="auth-buttons">
                <button class="auth-btn btn-login" id="login-btn">登录</button>
                <button class="auth-btn btn-register" id="register-btn">注册</button>
            </div>
            <div class="user-info" id="user-info">
                <span class="user-avatar-sm" id="user-avatar">U</span>
                <span id="username-display"></span>
                <button class="btn-logout" id="logout-btn">退出</button>
            </div>
        </div>
    </header>

    <!-- 搜索栏 -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="搜索闲置物品..." autocomplete="off">
        <select id="search-category">
            <option value="">全部分类</option>
        </select>
        <button class="search-btn" id="search-btn">🔍 搜索</button>
    </div>

    <!-- 分类导航 -->
    <div class="category-nav" id="category-nav"></div>

    <!-- 商品列表 -->
    <div class="products-container" id="products-container"></div>

    <!-- 分页 -->
    <div class="pagination-container" id="pagination-container"></div>

    <!-- 登录模态框 -->
    <div class="modal-mask" id="login-modal">
        <div class="modal-content">
            <button class="close-btn" data-close>&times;</button>
            <h2 class="modal-title">登录</h2>
            <form id="login-form">
                <div class="extra-error" id="login-error">❌ 用户名或密码错误</div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名">
                    <div class="error-tip" id="login-username-error">用户名不能为空</div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                    <div class="error-tip" id="login-password-error">密码不能为空</div>
                </div>
                <button type="button" class="btn-submit" id="do-login">登录</button>
                <div class="switch-tip">还没有账号？<span class="switch-link" id="to-register">立即注册</span></div>
            </form>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div class="modal-mask" id="register-modal">
        <div class="modal-content">
            <button class="close-btn" data-close>&times;</button>
            <h2 class="modal-title">注册</h2>
            <form id="register-form">
                <div class="extra-error" id="reg-error">❌ 用户名已存在</div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="reg-username" placeholder="3-20位字母数字下划线">
                    <div class="error-tip" id="reg-username-error">用户名不能为空</div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="至少6位">
                    <div class="error-tip" id="reg-password-error">密码至少6位</div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="reg-repassword" placeholder="再次输入密码">
                    <div class="error-tip" id="reg-repassword-error">两次密码不一致</div>
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="reg-nickname" placeholder="可选">
                </div>
                <button type="button" class="btn-submit" id="do-register">注册</button>
                <div class="switch-tip">已有账号？<span class="switch-link" id="to-login">立即登录</span></div>
            </form>
        </div>
    </div>

    <script type="module" src="../../utils/api.js"></script>
    <script type="module" src="index.js"></script>

    <!-- 客服聊天悬浮按钮 -->
    <div class="chat-float-btn" id="chat-float-btn">💬</div>

    <!-- 客服聊天窗口 -->
    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <div class="title">🤖 智能客服小橘</div>
            <button class="close-btn" id="chat-close-btn">&times;</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-message bot">
                <div class="avatar">🤖</div>
                <div class="msg-content">您好！我是智能客服小橘，很高兴为您服务~ 请问有什么可以帮您的？</div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="输入您的问题..." autocomplete="off">
            <button id="chat-send-btn">发送</button>
        </div>
    </div>

    <script type="module">
        import { chat } from '../../utils/api.js';

        const floatBtn = document.getElementById('chat-float-btn');
        const chatContainer = document.getElementById('chat-container');
        const chatCloseBtn = document.getElementById('chat-close-btn');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');

        floatBtn.addEventListener('click', () => {
            floatBtn.classList.toggle('active');
            chatContainer.classList.toggle('show');
        });

        chatCloseBtn.addEventListener('click', () => {
            floatBtn.classList.remove('active');
            chatContainer.classList.remove('show');
        });

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `chat-message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="msg-content">${text}</div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            chatInput.value = '';
            chatSendBtn.disabled = true;

            try {
                const result = await chat(text);
                appendMessage(result.reply || '抱歉，我暂时无法回答这个问题', false);
            } catch (error) {
                appendMessage('抱歉，网络连接异常，请稍后再试~', false);
            } finally {
                chatSendBtn.disabled = false;
            }
        }

        chatSendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
